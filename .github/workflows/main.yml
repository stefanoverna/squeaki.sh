name: Rebuild
on:
  # Trigger daily rebuild at midnight UTC
  schedule:
    - cron: '0 0 * * *'

  # Can be run manually
  workflow_dispatch:
jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Workers Build
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/builds/triggers/${{ secrets.CLOUDFLARE_BUILD_TRIGGER_UUID }}/builds" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}'
